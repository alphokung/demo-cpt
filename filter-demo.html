<body>
  <div class="app-container">
    <div class="main-layout">
      <main class="fdemo-main">

        <!-- Welcome Banner -->
        <div class="fdemo-banner">
          <p class="fdemo-banner-greeting">ยินดีต้อนรับ</p>
          <p class="fdemo-banner-name" id="fdemo-banner-name">กำลังโหลด...</p>
          <p class="fdemo-banner-sub" id="fdemo-banner-sub"></p>
        </div>

        <!-- Filter Chips -->
        <div class="fdemo-filter-row">
          <button class="fdemo-filter-chip active" data-filter="all" onclick="setFilter('all')">ทั้งหมด</button>
          <button class="fdemo-filter-chip" data-filter="valid" onclick="setFilter('valid')">
            <span class="fdemo-filter-dot dot-valid"></span>
            ใบรับรองแพทย์ที่ใช้งานได้
          </button>
          <button class="fdemo-filter-chip" data-filter="expired" onclick="setFilter('expired')">
            <span class="fdemo-filter-dot dot-expired"></span>
            ใบรับรองแพทย์ที่หมดอายุ
          </button>
        </div>

        <!-- Dynamic Content -->
        <div id="fdemo-content">
          <!-- Rendered by demo.js -->
        </div>

        <!-- Timestamp -->
        <p class="fdemo-timestamp">ข้อมูลใบรับรองแพทย์ดิจิทัล จากหมอพร้อม<br>ณ วันที่ 2 มกราคม 2569  11.40 น.</p>

      </main>
    </div>

    <!-- Sticky Footer -->
    <div class="sticky-footer">
      <button class="btn btn-tertiary-outline flex-center" style="gap: var(--spacing-md)">
        <span class="material-symbols-outlined" style="font-size:20px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">info</span>
        วิธีขอใบรับรองแพทย์ดิจิทัล
      </button>
    </div>

  </div>

  <!-- Demo state toggle (floating) -->
  <button class="fdemo-demo-toggle" id="fdemo-toggle-btn" onclick="toggleDemoState()">สลับ: ไม่มีข้อมูล</button>

  <script src="demo.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', initFilterDemo);
  </script>
</body>
