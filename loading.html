<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเชื่อมต่อระบบ — ระบบใบสั่งจราจรออนไลน์</title>
  <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="loading-page-body">
  <div class="app-container">
    <div class="main-layout loading-layout">
      <main class="loading-main">
        <!-- Illustration Container -->
        <div class="loading-illustration-container">
          <img src="_media/loading-base.svg" class="loading-base-img" alt="กำลังเชื่อมต่อ">
          <div class="loading-arrows-container">
            <img src="_media/loading-arrow.svg" class="loading-arrow-img" alt="ลูกศรโหลดข้อมูล">
          </div>
          <img src="_media/loading-department.svg" class="loading-department-img" alt="โลโก้หน่วยงาน">
        </div>

        <!-- Text Block -->
        <div class="loading-text-block">
          <h1 class="loading-title">กำลังเชื่อม ใบรับรองแพทย์ดิจิทัล</h1>
          <p class="loading-subtitle">
            ระบบกำลังตรวจสอบข้อมูลของท่าน กับฐานข้อมูลใบรับรองแพทย์ดิจิทัล จากหมอพร้อม
          </p>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
