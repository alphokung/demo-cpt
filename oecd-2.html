<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thailand — OECD Digital Government Outlook 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --navy:#0b2545; --navy2:#13315c; --accent:#0f8b8d; --accent2:#e07a3f;
    --yes:#1f9d55; --no:#d64545; --na:#9aa5b1;
    --bg:#f5f7fa; --card:#ffffff; --ink:#1b2733; --sub:#5b6b7a; --line:#e3e8ee;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Thai","Sarabun",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  body[data-lang="th"]{font-family:"Noto Sans Thai","Sarabun",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:28px 32px 22px;position:relative;}
  header .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;opacity:.75;margin-bottom:6px;}
  header h1{margin:0 0 6px;font-size:26px;font-weight:700;}
  header p{margin:0;font-size:14px;opacity:.85;max-width:780px;line-height:1.5;}
  .badge-row{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);padding:5px 12px;border-radius:20px;font-size:12px;}

  .lang-switch{position:absolute;top:24px;right:32px;display:flex;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);border-radius:20px;overflow:hidden;}
  .lang-switch button{border:none;background:none;color:#fff;font-size:12.5px;font-weight:700;padding:7px 16px;cursor:pointer;opacity:.65;}
  .lang-switch button.active{background:rgba(255,255,255,.92);color:var(--navy);opacity:1;}

  nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 24px;z-index:50;overflow-x:auto;}
  nav button{border:none;background:none;padding:14px 16px;font-size:13.5px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav button:hover{color:var(--navy);}
  nav button.active{color:var(--navy);border-bottom-color:var(--accent2);}

  main{max-width:1080px;margin:0 auto;padding:26px 20px 80px;}
  section.view{display:none;}
  section.view.active{display:block;}

  h2.section-title{font-size:20px;margin:0 0 4px;color:var(--navy);}
  p.section-sub{margin:0 0 20px;color:var(--sub);font-size:14px;max-width:760px;line-height:1.55;}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:26px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;cursor:pointer;transition:box-shadow .15s,transform .15s;}
  .card:hover{box-shadow:0 6px 18px rgba(11,37,69,.1);transform:translateY(-2px);}
  .card h3{margin:0 0 10px;font-size:13.5px;color:var(--navy);}
  .ring-wrap{display:flex;align-items:center;gap:12px;}
  .card .stat-lines{font-size:12px;color:var(--sub);line-height:1.6;}
  .card .stat-lines b{color:var(--ink);}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
  .toolbar input[type=search]{flex:1;min-width:220px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--sub);align-items:center;flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

  .chapter-block{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:16px;overflow:hidden;}
  .chapter-head{padding:14px 18px;background:#f8fafc;border-bottom:1px solid var(--line);}
  .chapter-head h3{margin:0;font-size:15px;color:var(--navy);}
  .chapter-body{padding:6px 18px 14px;}

  table.ind-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0 18px;}
  table.ind-table caption{text-align:left;font-size:12.5px;font-weight:700;color:var(--navy);padding:10px 0 6px;}
  table.ind-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--sub);padding:6px 8px;border-bottom:1px solid var(--line);}
  table.ind-table td{padding:8px 8px;border-bottom:1px solid #eef1f5;vertical-align:top;}
  table.ind-table tr.hidden{display:none;}
  .indicator-name{max-width:300px;}
  .indicator-name .nm{font-weight:600;color:var(--ink);display:block;}
  .indicator-name .desc{display:block;font-weight:400;color:var(--sub);font-size:11.8px;line-height:1.45;margin-top:2px;}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:52px;padding:3px 8px;border-radius:6px;font-size:11.5px;font-weight:700;color:#fff;}
  .badge.yes{background:var(--yes);}
  .badge.no{background:var(--no);}
  .badge.na{background:var(--na);}
  .badge.dev{background:var(--accent2);}
  .asis-section-row td{background:#f8fafc;font-weight:700;color:var(--navy);font-size:12px;padding:8px;}
  .status-note{display:block;color:var(--sub);font-size:11.5px;line-height:1.5;margin-top:3px;}
  .asis-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .asis-tabs button{border:1px solid var(--line);background:#fff;color:var(--sub);padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;}
  .asis-tabs button.active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .asis-chgroup{display:none;}
  .asis-chgroup.active{display:block;}
  .oecd-bar-wrap{display:flex;align-items:center;gap:8px;padding-top:2px;}
  .oecd-bar-track{background:#eef1f5;border-radius:5px;height:8px;width:120px;overflow:hidden;}
  .oecd-bar-fill{background:var(--accent);height:8px;}
  .oecd-pct{font-size:11.5px;color:var(--sub);width:34px;}
  .src-note{font-size:11px;color:var(--sub);margin:-6px 0 14px;}

  .challenge-card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent2);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
  .challenge-card h3{margin:0 0 6px;font-size:15px;color:var(--navy);}
  .challenge-card .rank{display:inline-block;background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;margin-right:8px;}
  .challenge-card p{margin:6px 0;font-size:13.5px;color:var(--ink);line-height:1.6;}
  .challenge-card ul{margin:8px 0 4px;padding-left:18px;font-size:13px;color:var(--sub);}
  .challenge-card li{margin-bottom:3px;}
  .jump-link{font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;text-decoration:underline;}

  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:22px;}
  .info-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:15px 17px;}
  .info-card h4{margin:0 0 6px;font-size:13.5px;color:var(--navy);}
  .info-card p{margin:0;font-size:12.8px;color:var(--sub);line-height:1.55;}

  .dim-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:14px 0 24px;}
  .dim{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .dim b{font-size:12.8px;color:var(--navy);display:block;margin-bottom:4px;}
  .dim span{font-size:12px;color:var(--sub);line-height:1.5;}
  h3.sub-heading{font-size:15px;color:var(--navy);margin:22px 0 4px;}

  .plan-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
  .plan-card h3{margin:0 0 4px;font-size:15px;color:var(--navy);}
  .plan-card .rank{display:inline-block;background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;margin-right:8px;}
  .verdict{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;margin:6px 0 10px;color:#fff;}
  .verdict.strong{background:var(--yes);}
  .verdict.partial{background:var(--accent2);}
  .verdict.gap{background:var(--no);}
  .plan-block{border-left:3px solid var(--line);padding:4px 0 4px 12px;margin:10px 0;}
  .plan-block b{font-size:12.5px;color:var(--navy);display:block;margin-bottom:4px;}
  .plan-block p, .plan-block ul{margin:0;font-size:13px;color:var(--ink);line-height:1.6;}
  .plan-block ul{padding-left:18px;}
  #plan-summary-table td, #plan-summary-table th{font-size:12.5px;}
  footer{max-width:1080px;margin:0 auto;padding:10px 20px 50px;font-size:11.5px;color:var(--sub);}
  .callout{background:#fff6ee;border:1px solid #f2ddc4;color:#7a4b1a;border-radius:10px;padding:12px 16px;font-size:12.8px;margin-bottom:20px;line-height:1.55;}
</style>
</head>
<body data-lang="en">

<header>
  <div class="lang-switch" id="lang-switch">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="th">ไทย</button>
  </div>
  <div class="eyebrow" id="t-eyebrow"></div>
  <h1 id="t-h1"></h1>
  <p id="t-intro"></p>
  <div class="badge-row" id="t-pills"></div>
</header>

<nav id="tabs">
  <button data-view="overview" class="active" id="nav-overview"></button>
  <button data-view="ch2" id="nav-ch2"></button>
  <button data-view="ch3" id="nav-ch3"></button>
  <button data-view="ch4" id="nav-ch4"></button>
  <button data-view="ch5" id="nav-ch5"></button>
  <button data-view="challenges" id="nav-challenges"></button>
  <button data-view="plan" id="nav-plan"></button>
  <button data-view="asis" id="nav-asis"></button>
  <button data-view="context" id="nav-context"></button>
</nav>

<main>

  <!-- OVERVIEW -->
  <section class="view active" id="view-overview">
    <h2 class="section-title" id="ov-title"></h2>
    <p class="section-sub" id="ov-sub"></p>
    <div class="callout" id="ov-callout"></div>
    <div class="cards" id="overview-cards"></div>
    <div class="chapter-block">
      <div class="chapter-head"><h3 id="rtf-title"></h3></div>
      <div class="chapter-body" style="padding-top:14px;">
        <p style="font-size:13.5px;line-height:1.7;color:var(--ink)" id="rtf-p1"></p>
        <p style="font-size:13.5px;line-height:1.7;color:var(--ink)" id="rtf-p2"></p>
      </div>
    </div>
  </section>

  <section class="view" id="view-ch2"></section>
  <section class="view" id="view-ch3"></section>
  <section class="view" id="view-ch4"></section>
  <section class="view" id="view-ch5"></section>

  <section class="view" id="view-challenges">
    <h2 class="section-title" id="chal-title"></h2>
    <p class="section-sub" id="chal-sub"></p>
    <div id="challenges-list"></div>
  </section>

  <section class="view" id="view-plan">
    <h2 class="section-title" id="plan-title"></h2>
    <p class="section-sub" id="plan-sub"></p>
    <div class="info-grid" id="plan-overview-grid"></div>
    <h3 class="sub-heading" id="plan-map-heading"></h3>
    <p class="section-sub" id="plan-map-sub" style="margin-top:-8px;"></p>
    <div id="plan-responses"></div>
    <h3 class="sub-heading" id="plan-table-heading"></h3>
    <div style="overflow-x:auto;"><table class="ind-table" id="plan-summary-table"></table></div>
  </section>

  <section class="view" id="view-asis">
    <h2 class="section-title" id="asis-title"></h2>
    <p class="section-sub" id="asis-sub"></p>
    <div class="callout" id="asis-callout"></div>
    <div class="cards" id="asis-cards"></div>
    <h3 class="sub-heading" id="asis-oecd-heading"></h3>
    <p class="section-sub" id="asis-oecd-sub" style="margin-top:-8px;"></p>
    <div id="asis-oecd-body"></div>
    <h3 class="sub-heading" id="asis-egdi-heading"></h3>
    <p class="section-sub" id="asis-egdi-sub" style="margin-top:-8px;"></p>
    <div id="asis-egdi-body"></div>
  </section>

  <section class="view" id="view-context">
    <h2 class="section-title" id="ctx-title"></h2>
    <p class="section-sub" id="ctx-sub"></p>
    <div class="info-grid" id="info-grid"></div>
    <h3 class="sub-heading" id="dim-heading"></h3>
    <div class="dim-grid" id="dim-grid"></div>
    <h3 class="sub-heading" id="priority-heading"></h3>
    <div class="dim-grid" id="priority-grid"></div>
  </section>

</main>

<footer id="t-footer"></footer>

    gap:"These KPIs measure connection rates and compliance scores, not the specific practice gaps OECD flagged: data-quality-assessment processes, anonymisation practice, and formal sharing-arrangement documentation (both inter-agency and with external providers) — the three sub-indicators Thailand scored \"No\" on.",

      "เผยแพร่แม่แบบข้อตกลง/เอกสารทางกฎหมายมาตรฐานสำหรับการแบ่งปันข้อมูลทั้งระหว่างหน่วยงานและกับผู้ให้ข้อมูลภายนอก เป็นส่วนหนึ่งของชุดเครื่องมือโครงการธรรมาภิบาลข้อมูล เพื่อปิดตัวชี้วัดย่อยที่เหลืออีก 2 ข้อที่ตอบ “ไม่มี” โดยตรง"

structure", "name": "Digital notifications", "oecdStatus": 0, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "หน่วยงานภาครัฐใช้ SMS, Email และแอปพลิเคชันสำหรับการแจ้งเตือนประชาชน", "dgFlag": 1, "dgRef": "2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - Notification", "remark": "มีการจัดทำแผนซึ่งลงรายละเอียดถึงการพัฒนา Notification สำหรับเป็นช่องทางกลางในการแจ้งเตือน", "def": "Digital notifications are systems that allow public institutions to send messages – by emails, text or post – to keep people and business informed about their interactions with government."}, {"section": "Availability of digital public infrastructure", "name": "Digital payments", "oecdStatus": 1, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "รองรับ e-Payment ภาครัฐผ่าน PromptPay, e-Payment และระบบรับชำระอิเล็กทรอนิกส์", "dgFlag": 1, "dgRef": "2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - National Payment Platform", "remark": null, "def": "Digital payment systems enable governments to send and receive payments with people and businesses – for example, paying benefits faster, collecting fees more easily or tracking transactions more reliably"}, {"section": "Availability of digital public infrastructure", "name": "Data sharing", "oecdStatus": 0, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "มีการแลกเปลี่ยนข้อมูลผ่าน GDX และแพลตฟอร์มข้อมูลภาครัฐ", "dgFlag": 1, "dgRef": "1.2 กำหนดกรอบและมาตรฐานการออกแบบบริการดิจิทัล โดยยึดหลักการให้ข้อมูลเพียงครั้งเดียว (Once Only) การลดขั้นตอนที่ไม่จำเป็น และการยึดผู้ใช้เป็นศูนย์กลาง (User-Centric) \n2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - Data Interoperability Platform\n3.2 ผลักดันให้หน่วยงานมาเชื่อมต่อข้อมูลกับแพลตฟอร์มกลางสำหรับการเชื่อมโยงและแลกเปลี่ยนข้อมูลภาครัฐ โดยให้ปฏิบัติตามมาตรฐานการแลกเปลี่ยนข้อมูล และเชื่อมต่อข้อมูลตามลำดับความสำคัญ", "remark": "- แผนฯ มุ่งเน้นการเชื่อมโยงและแลกเปลี่ยนข้อมูลภาครัฐ อาจยังไม่ครอบคลุมถึงการแลกเปลี่ยนข้อมูลกับภาคเอกชน\n- ประเด็น Once Only กล่าวถึงในการจัดทำมาตรฐานและคู่มือการออกแบบบริการ", "def": "Data sharing systems enable governments organisations to exchange information with each other, and in some cases with the private sector and civil society, under appropriate safeguards. They make it possible to apply the once-only principle – collecting information from a person or business once and reusing it across services, rather than different providers/government institutions asking users for the same details repeatedly."}, {"section": "Availability of digital public infrastructure", "name": "Single digital gateway", "oecdStatus": 0, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "ดำเนินการผ่านพอร์ทัลบริการภาครัฐกลาง 'ทางรัฐ'", "dgFlag": 1, "dgRef": "1.1 ออกแบบและพัฒนาแพลตฟอร์มกลางของบริการภาครัฐ (Single Portal) รวมถึงบริการสำคัญ (Priority Services) อย่างเร่งด่วน พร้อมผลักดันให้ทุกหน่วยงานมีการเชื่อมต่อบริการบนแพลตฟอร์มกลางของบริการภาครัฐ\n2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - Single Portal", "remark": null, "def": "Single digital gateways facilitate the discovery and access of government services, reducing the need for individual solutions and platforms."}, {"section": "Availability of digital public infrastructure", "name": "Digital identity providing access to +50% of services", "oecdStatus": 0, "oecdRef": null, "thStatus": "อยู่ระหว่างขยายผล", "thStatusNorm": "developing", "thDetail": "Thai Digital ID และแอปทางรัฐรองรับบริการจำนวนมาก แต่ยังไม่ครอบคลุมทุกบริการภาครัฐ", "dgFlag": 1, "dgRef": "พัฒนาโครงสร้างและบริการพื้นฐานทางเทคโนโลยี - KPI\n2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - Digital ID", "remark": "ยุทธศาสตร์ที่ 2 กำหนดให้หน่วยงานต้องนำ Digital ID ไปใช้ ซึ่งมีส่วนขับเคลื่อนในการขยายผลให้มีการใช้งาน +50% ของบริการ", "def": "Digital identity systems allow people and organisations to prove who they are when accessing services online – securely, efficiently and increasingly across borders. They include ways of logging in, signing documents digitally and, in more advanced cases, storing and sharing verified digital credentials through a digital wallet."}, {"section": "Authentication methods for digital identity solutions", "name": "Username and password", "oecdStatus": 1, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "มีการใช้ username and password ในการล็อคอินเข้าใช้บริการดิจิทัลภาครัฐบางช่องทาง", "dgFlag": 0, "dgRef": null, "remark": "แผนเราไม่ได้แนะนำให้ใช้แค่ username password ในการ login", "def": "Authentication based on a user-chosen secret (a username paired with a password); the most basic and least secure single-factor method. - Username and password (without an\nadditional verification step)"}, {"section": "Authentication methods for digital identity solutions", "name": "Smartcard", "oecdStatus": 1, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "บัตรประชาชนของไทยเป็น smartcard สามารถใช้ยืนยันตัวตนได้", "dgFlag": 0, "dgRef": null, "remark": "ไม่ระบุในแผน", "def": "Authentication using a physical smartcard (e.g. a national ID card with an embedded chip) that the user presents to a reader to prove identity."}, {"section": "Authentication methods for digital identity solutions", "name": "Digital certificate file", "oecdStatus": 1, "oecdRef": null, "thStatus": "โปรดตรวจสอบเพิ่มเติม", "thStatusNorm": "unverified", "thDetail": "ยังไม่มีข้อมูลสาธารณะที่เพียงพอสำหรับยืนยันสถานะปัจจุบันของประเทศไทย หรืออยู่ระหว่างการพัฒนา", "dgFlag": 1, "dgRef": "2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - Document Wallet", "remark": "มีการจัดทำแผนซึ่งลงรายละเอียดถึงการพัฒนา Document Wallet ในการจัดเก็บเอกสารอิเล็กทรอนิกส์จากภาครัฐ เช่น ใบขับขี่ บัตรประชาชน passport ซึ่งใช้ยืนยันตัวตนได้", "def": "Authentication using a digital certificate file stored on a device that cryptographically proves the holder's identity."}, {"section": "Authentication methods for digital identity solutions", "name": "SMS 2FA", "oecdStatus": 1, "oecdRef": null, "thStatus": "โปรดตรวจสอบเพิ่มเติม", "thStatusNorm": "unverified", "thDetail": "ยังไม่มีข้อมูลสาธารณะที่เพียงพอสำหรับยืนยันสถานะปัจจุบันของประเทศไทย หรืออยู่ระหว่างการพัฒนา", "dgFlag": 0, "dgRef": null, "remark": "ไม่ระบุในแผน", "def": "Two-factor authentication in which a one-time code is sent by SMS text message to the user's registered mobile number."}, {"section": "Authentication methods for digital identity solutions", "name": "Email 2FA", "oecdStatus": 1, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "บางเว็บไซต์นอกจากใช้ username and password อาจมีการให้ยืนยันตัวตนผ่าน e-mail ที่ลงทะเบียน", "dgFlag": 0, "dgRef": null, "remark": "ไม่ระบุในแผน", "def": "Two-factor authentication in which a one-time code is sent to the user's registered email address."}, {"section": "Authentication methods for digital identity solutions", "name": "App 2FA", "oecdStatus": 1, "oecdRef": null, "thStatus": "มี", "thStatusNorm": "has", "thDetail": "มีการยืนยันตัวตนโดยใช้แอปพลิเคชัน เช่น ThaID (กรมการปกครอง) ทางรัฐ (สพร.)", "dgFlag": 1, "dgRef": "2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - Digital ID", "remark": "เป็นแนวทางหลักในการพัฒนา Digital ID", "def": "Two-factor authentication using a dedicated authenticator application on a smartphone to generate or approve one-time codes."}, {"section": "Authentication methods for digital identity solutions", "name": "Other", "oecdStatus": 0, "oecdRef": null, "thStatus": "โปรดตรวจสอบเพิ่มเติม", "thStatusNorm": "unverified", "thDetail": "ยังไม่มีข้อมูลสาธารณะที่เพียงพอสำหรับยืนยันสถานะปัจจุบันของประเทศไทย หรืออยู่ระหว่างการพัฒนา", "dgFlag": 1, "dgRef": "2.2 พัฒนาบริการดิจิทัลพื้นฐาน (Common Services) เพื่อลดความซ้ำซ้อนในการพัฒนา - Digital ID & e-Signature", "remark": "- Digital ID ระบุให้มีการพัฒนา Facial Recognition \n- e-Signature ระบุถึง usecase ที่อ /* ============ STATE ============ */
let currentLang = "en";

/* ============ RENDER HELPERS ============ */
function badge(val){
  const t = I18N[currentLang];
  if(val==="Y") return `<span class="badge yes">${t.badgeYes}</span>`;
  if(val==="N") return `<span class="badge no">${t.badgeNo}</span>`;
  return `<span class="badge na">${t.badgeNa}</span>`;
}
function countStats(tables){
  let y=0,n=0,na=0;
  tables.forEach(t=>t.rows.forEach(r=>{ if(r.th==="Y")y++; else if(r.th==="N")n++; else na++; }));
  return {y,n,na,total:y+n+na, answered:y+n};
}
function ringSVG(pct, size=56){
  const r=22, c=2*Math.PI*r;
  const off = c - (pct/100)*c;
  const color = pct>=60?"#1f9d55":pct>=35?"#e07a3f":"#d64545";
  return `<svg width="${size}" height="${size}" viewBox="0 0 56 56">
    <circle cx="28" cy="28" r="${r}" fill="none" stroke="#eef1f5" stroke-width="7"/>
    <circle cx="28" cy="28" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 28 28)"/>
  </svg>`;
}

function renderStatic(){
  const t = I18N[currentLang];
  document.getElementById('t-eyebrow').textContent = t.eyebrow;
  document.getElementById('t-h1').textContent = t.h1;
  document.getElementById('t-intro').textContent = t.intro;
  document.getElementById('t-pills').innerHTML = t.pills.map(p=>`<span class="pill">${p}</span>`).join("");
  Object.entries(t.nav).forEach(([k,v])=>{ const el=document.getElementById('nav-'+k); if(el) el.textContent=v; });
  document.getElementById('ov-title').textContent = t.ovTitle;
  document.getElementById('ov-sub').textContent = t.ovSub;
  document.getElementById('ov-callout').innerHTML = t.ovCallout;
  document.getElementById('rtf-title').textContent = t.rtfTitle;
  document.getElementById('rtf-p1').innerHTML = t.rtfP1;
  document.getElementById('rtf-p2').innerHTML = t.rtfP2;
  document.getElementById('chal-title').textContent = t.chalTitle;
  document.getElementById('chal-sub').textContent = t.chalSub;
  document.getElementById('ctx-title').textContent = t.ctxTitle;
  document.getElementById('ctx-sub').textContent = t.ctxSub;
  document.getElementById('info-grid').innerHTML = t.infoCards.map(c=>`<div class="info-card"><h4>${c.h}</h4><p>${c.p}</p></div>`).join("");
  document.getElementById('dim-heading').textContent = t.dimHeading;
  document.getElementById('priority-heading').textContent = t.priorityHeading;
  document.getElementById('t-footer').innerHTML = t.footer;
  document.body.setAttribute('data-lang', currentLang);
  document.documentElement.setAttribute('lang', currentLang==="th"?"th":"en");
}

function renderOverviewCards(){
  const t = I18N[currentLang];
  const wrap = document.getElementById('overview-cards');
  let html = "";
  Object.entries(CHAPTERS).forEach(([key, ch])=>{
    const s = countStats(ch.tables);
    const pct = s.answered ? Math.round(100*s.y/s.answered) : 0;
    const label = currentLang==="th" ? ch.label_th : ch.label;
    html += `<div class="card" data-goto="${key}">
      <h3>${label}</h3>
      <div class="ring-wrap">
        <div style="position:relative;width:56px;height:56px;">${ringSVG(pct)}
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--navy);">${pct}%</div>
        </div>
        <div class="stat-lines">
          <div><b>${s.y}</b> ${t.badgeYes} · <b>${s.n}</b> ${t.badgeNo} · <b>${s.na}</b> N/A</div>
          <div>${t.indicatorsTracked(s.total)}</div>
          <div style="color:var(--accent);font-weight:600;">${t.viewDetail}</div>
        </div>
      </div>
    </div>`;
  });
  wrap.innerHTML = html;
  wrap.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>switchView(c.dataset.goto)));
}

function renderChapter(key){
  const t = I18N[currentLang];
  const ch = CHAPTERS[key];
  const el = document.getElementById('view-'+key);
  const s = countStats(ch.tables);
  const pct = s.answered ? Math.round(100*s.y/s.answered) : 0;
  const label = currentLang==="th" ? ch.label_th : ch.label;
  const blurb = currentLang==="th" ? ch.blurb_th : ch.blurb;
  let html = `
    <h2 class="section-title">${label}</h2>
    <p class="section-sub">${blurb} — ${t.answeredLine(s.y, s.answered, pct, s.na)}</p>
    <div class="toolbar">
      <input type="search" placeholder="${t.filterPlaceholder}" data-filter="${key}">
      <div class="legend">
        <span><span class="dot" style="background:var(--yes)"></span>${t.legend.yes}</span>
        <span><span class="dot" style="background:var(--no)"></span>${t.legend.no}</span>
        <span><span class="dot" style="background:var(--na)"></span>${t.legend.na}</span>
        <span><span class="dot" style="background:var(--accent)"></span>${t.legend.oecd}</span>
      </div>
    </div>
    <div id="${key}-tables"></div>
  `;
  el.innerHTML = html;

  let tablesHtml = "";
  ch.tables.forEach(tbl=>{
    const title = currentLang==="th" ? tbl.title_th : tbl.title;
    const note = currentLang==="th" ? tbl.note_th : tbl.note;
    tablesHtml += `<table class="ind-table" data-table>
      <caption>${title} <span style="font-weight:400;color:var(--sub)">— ${tbl.src}</span></caption>
      <tr><th class="indicator-name">${t.tableHead.indicator}</th><th>${t.tableHead.thailand}</th><th>${t.tableHead.oecd}</th><th>${t.tableHead.idn}</th></tr>`;
    tbl.rows.forEach(r=>{
      const rname = currentLang==="th" ? r.name_th : r.name;
      const rdesc = currentLang==="th" ? r.desc_th : r.desc;
      const searchBlob = (r.name + " " + r.name_th + " " + (r.desc||"") + " " + (r.desc_th||"")).toLowerCase();
      tablesHtml += `<tr data-name="${searchBlob}">
        <td class="indicator-name"><span class="nm">${rname}</span><span class="desc">${rdesc||""}</span></td>
        <td>${badge(r.th)}</td>
        <td><div class="oecd-bar-wrap"><div class="oecd-bar-track"><div class="oecd-bar-fill" style="width:${r.oecd}%"></div></div><span class="oecd-pct">${r.oecd}%</span></div></td>
        <td>${badge(r.idn)}</td>
      </tr>`;
    });
    tablesHtml += `</table><div class="src-note">${note}</div>`;
  });
  document.getElementById(key+'-tables').innerHTML = tablesHtml;

  el.querySelector('input[data-filter]').addEventListener('input', e=>{
    const q = e.target.value.trim().toLowerCase();
    el.querySelectorAll('tr[data-name]').forEach(row=>{
      row.classList.toggle('hidden', q && !row.dataset.name.includes(q));
    });
  });
}

function renderChallenges(){
  const wrap = document.getElementById('challenges-list');
  const t = I18N[currentLang];
  let html = "";
  CHALLENGES.forEach(c=>{
    const title = currentLang==="th" ? c.title_th : c.title;
    const body = currentLang==="th" ? c.body_th : c.body;
    const evidence = currentLang==="th" ? c.evidence_th : c.evidence;
    const chLabel = currentLang==="th" ? CHAPTERS[c.chapter].label_th : CHAPTERS[c.chapter].label;
    html += `<div class="challenge-card">
      <h3><span class="rank">#${c.rank}</span>${title}</h3>
      <p>${body}</p>
      <ul>${evidence.map(e=>`<li>${e}</li>`).join("")}</ul>
      <span class="jump-link" data-goto="${c.chapter}">${t.jumpLink(chLabel)}</span>
    </div>`;
  });
  wrap.innerHTML = html;
  wrap.querySelectorAll('.jump-link').forEach(l=>l.addEventListener('click',()=>switchView(l.dataset.goto)));
}

function renderPlan(){
  const t = I18N[currentLang];
  document.getElementById('plan-title').textContent = t.planTitle;
  document.getElementById('plan-sub').textContent = t.planSub;
  document.getElementById('plan-map-heading').textContent = t.planMapHeading;
  document.getElementById('plan-map-sub').textContent = t.planMapSub;

  }).join("");

  const verdictLabel = (r)=> currentLang==="th" ? r.verdict_label_th : r.verdict_label;

      <h3><span class="rank">#${r.rank}</span>${title}</h3>

      <div class="plan-block"><b>${t.planResponseLabel}</b><p>${planResponse}</p></div>
      <div class="plan-block"><b>${t.planGapLabel}</b><p>${gap}</p></div>
      <div class="plan-block"><b>${t.planRecLabel}</b><ul>${recs.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    </div>`;
  });
  document.getElementById('plan-responses').innerHTML = html;

  const verdictWord = (v)=>{
    if(currentLang==="th") return v==="strong"?"ครอบคลุมดี":v==="partial"?"ครอบคลุมบางส่วน":"ยังไม่ครอบคลุม";
    return v==="strong"?"Strong":v==="partial"?"Partial":"Not addressed";
  };
  const scoreMap = {1:"0 of 3 (0%)",2:"0 of 5 (0%)",3:"5 of 14 (36%)",4:"1 of 6 (17%)",5:"14 of 25 (56%)"};
  const targetMap = {1:"2032 (AI Act pending)",2:"2032 (pace risk)",3:"Not yet targeted",4:"2032",5:"2032"};
  let tbl = `<tr><th>${t.planTable.area}</th><th>${t.planTable.score}</th><th>${t.planTable.coverage}</th><th>${t.planTable.target}</th><th>${t.planTable.rec}</th></tr>`;
  PLAN_RESPONSES.forEach(r=>{
    const title = currentLang==="th" ? r.title_th : r.title;
    const recs = currentLang==="th" ? r.recs_th : r.recs;
    tbl += `<tr>
      <td class="indicator-name"><span class="nm">#${r.rank} ${title}</span></td>
      <td>${scoreMap[r.rank]}</td>
      <td><span class="verdict ${r.verdict}" style="margin:0;">${verdictWord(r.verdict)}</span></td>
      <td>${targetMap[r.rank]}</td>
      <td style="max-width:260px;">${recs[0]}</td>
    </tr>`;
  });
  document.getElementById('plan-summary-table').innerHTML = tbl;
}

function asisStatusBadge(norm){
  const t = I18N[currentLang];
  const cls = norm==="has" ? "yes" : (norm==="developing"||norm==="partial") ? "dev" : "na";
  return `<span class="badge ${cls}">${t.asisStatusLabels[norm]||norm}</span>`;
}
function asisFlagBadge(flag){
  const t = I18N[currentLang];
  const key = (flag===1||flag===0) ? String(flag) : "null";
  const cls = flag===1 ? "yes" : flag===0 ? "no" : "na";
  return `<span class="badge ${cls}">${t.asisFlagLabels[key]}</span>`;
}
function renderAsIs(){
  const t = I18N[currentLang];
  document.getElementById('asis-title').textContent = t.asisTitle;
  document.getElementById('asis-sub').textContent = t.asisSub;
  document.getElementById('asis-callout').innerHTML = t.asisCallout;
  document.getElementById('asis-oecd-heading').textContent = t.asisOecdHeading;
  document.getElementById('asis-oecd-sub').textContent = t.asisOecdSub;
  document.getElementById('asis-egdi-heading').textContent = t.asisEgdiHeading;
  document.getElementById('asis-egdi-sub').textContent = t.asisEgdiSub;

  /* overview cards */
  let oecdTotal=0, oecdHas=0, oecdDgYes=0, oecdDgNo=0;
  AS_IS_OECD.chapters.forEach(ch=>ch.items.forEach(it=>{
    oecdTotal++;
    if(it.thStatusNorm==="has") oecdHas++;
    if(it.dgFlag===1) oecdDgYes++; else if(it.dgFlag===0) oecdDgNo++;
  }));
  let egdiTotal=0, egdiYes=0, egdiNo=0;
  AS_IS_EGDI.dims.forEach(d=>d.items.forEach(it=>{
    egdiTotal++;
    if(it.flag===1) egdiYes++; else if(it.flag===0) egdiNo++;
  }));
  const oecdDgPct = Math.round(100*oecdDgYes/(oecdDgYes+oecdDgNo));
  const egdiPct = Math.round(100*egdiYes/(egdiYes+egdiNo));
  const cardsHtml = `
    <div class="card">
      <h3>${t.asisOecdHeading.split(' — ')[0]}</h3>
      <div class="ring-wrap">
        <div style="position:relative;width:56px;height:56px;">${ringSVG(oecdDgPct)}
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--navy);">${oecdDgPct}%</div>
        </div>
        <div class="stat-lines">
          <div>${t.indicatorsTracked(oecdTotal)}</div>
          <div><b>${oecdHas}</b> ${t.asisStatusLabels.has} · <b>${oecdDgYes}</b> ${t.asisFlagLabels["1"]}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>${t.asisEgdiHeading.split(' — ')[0]}</h3>
      <div class="ring-wrap">
        <div style="position:relative;width:56px;height:56px;">${ringSVG(egdiPct)}
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--navy);">${egdiPct}%</div>
        </div>
        <div class="stat-lines">
          <div>${t.indicatorsTracked(egdiTotal)}</div>
          <div><b>${egdiYes}</b> ${t.asisFlagLabels["1"]} · <b>${egdiNo}</b> ${t.asisFlagLabels["0"]}</div>
        </div>
      </div>
    </div>`;
  document.getElementById('asis-cards').innerHTML = cardsHtml;

  /* OECD group tabs + tables */
  let tabsHtml = `<div class="asis-tabs" id="asis-oecd-tabs">` +
    AS_IS_OECD.chapters.map((ch,i)=>`<button data-ch="${ch.key}" class="${i===0?'active':''}">${currentLang==="th"?ch.label_th:ch.label}</button>`).join("") +
    `</div><input type="search" class="toolbar" style="display:block;width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;margin-bottom:14px;" placeholder="${t.asisFilterPlaceholder}" id="asis-oecd-filter">`;
  let groupsHtml = "";
  AS_IS_OECD.chapters.forEach((ch,i)=>{
    let rows = "";
    let lastSection = null;
    ch.items.forEach(it=>{
      if(it.section && it.section!==lastSection){
        rows += `<tr class="asis-section-row"><td colspan="4">${it.section}</td></tr>`;
        lastSection = it.section;
      }
      const blob = (it.name+" "+(it.thDetail||"")+" "+(it.dgRef||"")).toLowerCase();
      rows += `<tr data-name="${blob.replace(/"/g,'&quot;')}">
        <td class="indicator-name"><span class="nm">${it.name}</span>${it.def?`<span class="desc">${it.def}</span>`:""}</td>
        <td>${asisStatusBadge(it.thStatusNorm)}</td>
        <td>${asisFlagBadge(it.dgFlag)}</td>
        <td style="max-width:340px;"><span class="status-note">${it.thDetail||""}</span>${it.dgRef?`<span class="status-note"><b>${t.asisTableHead.dgplan}:</b> ${it.dgRef.replace(/\n/g,'; ')}</span>`:""}${it.remark?`<span class="status-note"><i>${it.remark}</i></span>`:""}</td>
      </tr>`;
    });
    groupsHtml += `<div class="asis-chgroup ${i===0?'active':''}" data-chgroup="${ch.key}">
      <table class="ind-table"><tr><th class="indicator-name">${t.asisTableHead.indicator}</th><th>${t.asisTableHead.current}</th><th>${t.asisTableHead.dgplan}</th><th>${t.asisTableHead.detail}</th></tr>${rows}</table>
    </div>`;
  });
  document.getElementById('asis-oecd-body').innerHTML = tabsHtml + groupsHtml;

  const oecdBody = document.getElementById('asis-oecd-body');
  oecdBody.querySelectorAll('#asis-oecd-tabs button').forEach(b=>{
    b.addEventListener('click', ()=>{
      oecdBody.querySelectorAll('#asis-oecd-tabs button').forEach(x=>x.classList.toggle('active', x===b));
      oecdBody.querySelectorAll('.asis-chgroup').forEach(g=>g.classList.toggle('active', g.dataset.chgroup===b.dataset.ch));
    });
  });
  oecdBody.querySelector('#asis-oecd-filter').addEventListener('input', e=>{
    const q = e.target.value.trim().toLowerCase();
    oecdBody.querySelectorAll('tr[data-name]').forEach(row=>{
      row.classList.toggle('hidden', q && !row.dataset.name.includes(q));
    });
  });

  /* EGDI/OSI tables by dimension */
  let egdiHtml = "";
  AS_IS_EGDI.dims.forEach(d=>{
    let rows = "";
    d.items.forEach(it=>{
      rows += `<tr>
        <td class="indicator-name"><span class="nm">${it.criterion}</span></td>
        <td>${it.coveredBy?`<span class="status-note">${it.coveredBy.replace(/\n/g,'; ')}${it.page?` (${it.page})`:""}</span>`:'<span class="status-note">—</span>'}</td>
        <td>${asisFlagBadge(it.flag)}</td>
      </tr>`;
    });
    const dimLabel = currentLang==="th" ? d.label_th : d.label;
    egdiHtml += `<table class="ind-table"><caption>${dimLabel} <span style="font-weight:400;color:var(--sub)">(${d.items.length})</span></caption>
      <tr><th class="indicator-name">${t.asisEgdiTableHead.criterion}</th><th>${t.asisEgdiTableHead.coveredBy}</th><th>${t.asisEgdiTableHead.flag}</th></tr>${rows}</table>`;
  });
  document.getElementById('asis-egdi-body').innerHTML = egdiHtml;
}

function renderAll(){
  renderStatic();
  renderOverviewCards();
  ['ch2','ch3','ch4','ch5'].forEach(renderChapter);
  renderChallenges();
  renderPlan();
  renderAsIs();
  renderContext();
}

/* ============ NAV ============ */
function switchView(view){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  document.querySelectorAll('section.view').forEach(s=>s.classList.toggle('active', s.id==='view-'+view));
  window.scrollTo({top:0, behavior:'smooth'});
}
document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-view]');
  if(btn) switchView(btn.dataset.view);
});
document.getElementById('lang-switch').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  currentLang = btn.dataset.lang;
  document.querySelectorAll('#lang-switch button').forEach(b=>b.classList.toggle('active', b.dataset.lang===currentLang));
  renderAll();
});

/* ============ INIT ============ */
renderAll();
</script>
</body>
</html>
