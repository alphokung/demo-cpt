<body>
  <div class="app-container">

    <!-- Scrollable Main Content Layout -->
    <div class="main-layout">

      <!-- Top Nav Bar (outside main so it spans full width) -->
      <div class="top-nav-bar">
        <div class="top-nav-bar-content">
          <div class="top-nav-bar-icon">
            <span class="material-symbols-outlined">local_police</span>
          </div>
          <p class="top-nav-bar-title">ข้อมูลใบสั่งจราจรของคุณ</p>
        </div>
      </div>

      <!-- Main Content -->
      <main>
        <!-- Welcome and Points Cards Dashboard -->
        <div class="dashboard-grid" style="grid-template-columns: 1fr;">
          <!-- Welcome Card -->
          <div class="card welcome-card">
            <h2 id="welcome-driver-name">
              <span class="skeleton-loading welcome-driver-name-skeleton"></span>
            </h2>
            <p id="welcome-text-1">
              <span class="skeleton-loading welcome-text-1-skeleton"></span>
            </p>
            <p id="welcome-text-2" class="mt-xs welcome-card-subtext">
              <span class="skeleton-loading welcome-text-2-skeleton"></span>
            </p>
          </div>

          <!-- Points Card (Interactive Link to points.html) -->
          <a href="points.html" class="card points-card card-interactive points-card-link" style="display:none;">
            <span class="points-card-title">คะแนนการขับขี่</span>
            <div class="dashboard-gauge-container">
              <svg class="dashboard-gauge-svg" viewBox="0 0 100 100">
                <circle class="dashboard-gauge-bg" cx="50" cy="50" r="42"></circle>
                <circle id="dashboard-gauge-fill" class="dashboard-gauge-fill" cx="50" cy="50" r="42" stroke-dasharray="264" stroke-dashoffset="264"></circle>
              </svg>
              <!-- Skeleton loading state inside the circle -->
              <div id="dashboard-gauge-skeleton" class="skeleton-loading skeleton-circle dashboard-gauge-skeleton-circle"></div>
              
              <!-- Actual text contents, hidden until load finishes -->
              <div id="dashboard-gauge-text" class="dashboard-gauge-text" style="display: none;">
                <span id="points-value" class="dashboard-gauge-value">-</span>
                <span class="dashboard-gauge-max">เต็ม 12 คะแนน</span>
              </div>
            </div>
          </a>
        </div>

        <!-- Dynamic Content Area -->
        <div id="tickets-area">
          <div class="list-container">
            <!-- Skeleton Card 1 -->
            <div class="card list-card">
              <div class="card-header">
                <div class="skeleton-loading skeleton-circle skeleton-avatar"></div>
                <div class="skeleton-header-text">
                  <div class="skeleton-loading skeleton-text skeleton-header-title"></div>
                  <div class="skeleton-loading skeleton-text skeleton-header-subtitle mb-0"></div>
                </div>
              </div>
              <div class="card-body skeleton-body">
                <div class="card-body-item">
                  <div class="skeleton-loading skeleton-body-label"></div>
                  <div class="skeleton-loading skeleton-body-value-1 mb-0"></div>
                </div>
                <div class="card-body-item">
                  <div class="skeleton-loading skeleton-body-label"></div>
                  <div class="skeleton-loading skeleton-body-value-2 mb-0"></div>
                </div>
              </div>
              <div class="skeleton-loading skeleton-button"></div>
            </div>
            <!-- Skeleton Card 2 -->
            <div class="card list-card">
              <div class="card-header">
                <div class="skeleton-loading skeleton-circle skeleton-avatar"></div>
                <div class="skeleton-header-text">
                  <div class="skeleton-loading skeleton-text skeleton-header-title"></div>
                  <div class="skeleton-loading skeleton-text skeleton-header-subtitle mb-0"></div>
                </div>
              </div>
              <div class="card-body skeleton-body">
                <div class="card-body-item">
                  <div class="skeleton-loading skeleton-body-label"></div>
                  <div class="skeleton-loading skeleton-body-value-3 mb-0"></div>
                </div>
                <div class="card-body-item">
                  <div class="skeleton-loading skeleton-body-label"></div>
                  <div class="skeleton-loading skeleton-body-value-4 mb-0"></div>
                </div>
              </div>
              <div class="skeleton-loading skeleton-button"></div>
            </div>
          </div>
        </div>

        <!-- Source note -->
        <div class="source-note">
          <p class="source-note-text">
            <span class="material-symbols-outlined source-note-icon">verified</span>
            ข้อมูลจากสำนักงานตำรวจแห่งชาติ<br>
            อัปเดตล่าสุด: <span class="source-note-time"></span>
          </p>
        </div>


      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="db.js"></script>
  <script>
    // Elements
    const ticketsArea = document.getElementById('tickets-area');
    const pointsValue = document.getElementById('points-value');
    const dashboardGaugeFill = document.getElementById('dashboard-gauge-fill');


    // Abbreviate Thai Date Months
    function abbreviateThaiDate(str) {
      if (!str) return '';
      return str
        .replace('มกราคม', 'ม.ค.')
        .replace('กุมภาพันธ์', 'ก.พ.')
        .replace('มีนาคม', 'มี.ค.')
        .replace('เมษายน', 'เม.ย.')
        .replace('พฤษภาคม', 'พ.ค.')
        .replace('มิถุนายน', 'มิ.ย.')
        .replace('กรกฎาคม', 'ก.ค.')
        .replace('สิงหาคม', 'ส.ค.')
        .replace('กันยายน', 'ก.ย.')
        .replace('ตุลาคม', 'ต.ค.')
        .replace('พฤศจิกายน', 'พ.ย.')
        .replace('ธันวาคม', 'ธ.ค.');
    }

    // Load and Render Points summary
    function renderPointsSummary() {
      const points = DB.getPoints();
      
      // Animate score number
      if (pointsValue) {
        let scoreVal = 0;
        const targetScore = points.remainingPoints;
        const duration = 800;
        const intervalTime = 30;
        const step = targetScore / (duration / intervalTime);
        
        const numAnim = setInterval(() => {
          scoreVal += step;
          if (scoreVal >= targetScore) {
            scoreVal = targetScore;
            clearInterval(numAnim);
          }
          pointsValue.textContent = Math.round(scoreVal);
        }, intervalTime);
      }
      
      if (dashboardGaugeFill) {
        const c = 264;
        dashboardGaugeFill.style.strokeDasharray = c;
        dashboardGaugeFill.style.strokeDashoffset = c;

        setTimeout(() => {
          const pct = (points.remainingPoints / points.maxPoints) * c;
          dashboardGaugeFill.style.strokeDashoffset = c - pct;
        }, 100);

        if (points.remainingPoints <= 3) {
          dashboardGaugeFill.style.stroke = 'var(--danger-40)';
        } else if (points.remainingPoints <= 7) {
          dashboardGaugeFill.style.stroke = 'var(--warning-50)';
        } else {
          dashboardGaugeFill.style.stroke = 'var(--primary-40)';
        }
      }
    }

    // Render Tickets list
    function renderTickets() {
      const tickets = DB.getTickets();
      const isEmpty = tickets.length === 0;

      // Update ticket count in welcome card dynamically
      const welcomeTicketCount = document.getElementById('welcome-ticket-count');
      if (welcomeTicketCount) {
        welcomeTicketCount.textContent = isEmpty ? 0 : tickets.length;
      }

      if (isEmpty) {
        ticketsArea.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon-circle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </div>
            <h3 class="empty-title">ไม่พบข้อมูลใบสั่งจราจร</h3>
            <p class="empty-desc">ไม่พบข้อมูลใบสั่งจราจร ในฐานข้อมูลของสำนักงานตำรวจแห่งชาติ</p>
          </div>
        `;
      } else {
        let html = '<div class="list-container">';
        
        tickets.forEach(ticket => {
          let statusIconSrc = '';
          // Determine status contents, colors, and the media SVG icon
          if (ticket.status === 'paid') {
            statusText = 'ชำระค่าปรับแล้ว';
            statusColorTextClass = 'status-text-paid';
            statusIconSrc = '_media/ticket-paid.svg';
          } else if (ticket.status === 'warning') {
            statusText = 'ยังไม่ได้ชำระค่าปรับ - ออกหนังสือเตือนแล้ว';
            statusColorTextClass = 'status-text-warning';
            statusIconSrc = '_media/ticket-expired.svg';
          } else {
            statusText = 'ยังไม่ได้ชำระค่าปรับ';
            statusColorTextClass = 'status-text-unpaid';
            statusIconSrc = '_media/ticket-pending.svg';
          }

          let statusDetailText = '';
          if (ticket.status === 'paid') {
            statusDetailText = abbreviateThaiDate(ticket.paymentDetails);
          } else {
            statusDetailText = `กรุณาชำระภายในวันที่ ${abbreviateThaiDate(ticket.dueDate)}`;
          }

          html += `
            <div class="card">
              <div class="card-header">
                <!-- Use SVGs from the _media folder -->
                <img src="${statusIconSrc}" alt="Ticket Status" class="status-icon-size">
                
                <div class="summary-info">
                  <span class="list-title">ใบสั่งเลขที่: ${ticket.ticketNumber}</span>
                  <span class="fine-title">ค่าปรับ: ${ticket.fine.toLocaleString()} บาท</span>
                </div>
              </div>
              
              <div class="card-body">
                <div class="card-body-item">
                  <span class="card-label">สถานที่เกิดเหตุ:</span>
                  <span class="card-value">${ticket.offenseLocation}</span>
                </div>
                <div class="card-body-item">
                  <span class="card-label">วันที่เกิดเหตุ:</span>
                  <span class="card-value">${abbreviateThaiDate(ticket.offenseDate)}</span>
                </div>
                <div class="card-body-item">
                  <span class="card-label">สถานะ:</span>
                  <span class="card-value">
                    <div class="flex-column">
                      <span class="card-status-title ${statusColorTextClass}">${statusText}</span>
                      <span class="card-status-desc ${statusColorTextClass}">${statusDetailText}</span>
                    </div>
                  </span>
                </div>
              </div>
              
              <a href="detail.html?id=${ticket.id}" class="btn btn-secondary card-btn-action flex-center">ดูรายละเอียด</a>
            </div>
          `;
        });
        
        html += '</div>';
        ticketsArea.innerHTML = html;
      }
    }

    // Initialize Page
    function initPage() {
      const welcomeDriverName = document.getElementById('welcome-driver-name');
      const welcomeText1 = document.getElementById('welcome-text-1');
      const welcomeText2 = document.getElementById('welcome-text-2');
      
      const gaugeSkeleton = document.getElementById('dashboard-gauge-skeleton');
      const gaugeText = document.getElementById('dashboard-gauge-text');
      
      if (gaugeSkeleton) gaugeSkeleton.style.display = 'block';
      if (gaugeText) gaugeText.style.display = 'none';
      
      setTimeout(() => {
        if (gaugeSkeleton) gaugeSkeleton.style.display = 'none';
        if (gaugeText) gaugeText.style.display = 'flex';
        
        renderPointsSummary();

        if (welcomeDriverName) {
          welcomeDriverName.textContent = 'สวัสดีคุณสมชาย';
        }
        if (welcomeText1) {
          welcomeText1.textContent = 'ยินดีต้อนรับสู่บริการ ใบสั่งจราจร';
        }
        if (welcomeText2) {
          welcomeText2.innerHTML = 'คุณมีใบสั่งทั้งหมด <span id="welcome-ticket-count" class="welcome-highlight"></span> ใบ ดังนี้';
        }

        renderTickets();
      }, 1000); // 1 sec delay
    }

    window.addEventListener('pageshow', () => {
      initPage();
    });

    initPage();
  </script>
  <script>
    (function() {
      var m = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
      var d = new Date();
      var s = d.getDate()+' '+m[d.getMonth()]+' '+(d.getFullYear()+543)+' เวลา '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+' น.';
      document.querySelectorAll('.source-note-time').forEach(function(e){e.textContent=s;});
    })();
  </script>

  <!-- Back to top -->
  <button class="back-to-top" id="back-to-top" aria-label="กลับขึ้นด้านบน" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <span class="material-symbols-outlined">arrow_upward</span>
  </button>
  <script>
    (function(){var b=document.getElementById('back-to-top');window.addEventListener('scroll',function(){b.classList.toggle('visible',window.pageYOffset>240);},{passive:true});})();
  </script>
</body>
